<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assistant Pro</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #007bff;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3700b3;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        #main-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
            transition: 0.3s;
        }

        .controls { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #start-btn { background: #28a745; color: white; }
        #stop-btn { background: #dc3545; color: white; }
        #dark-mode-btn { background: #6c757d; color: white; font-size: 12px; }

        .display-area {
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            min-height: 100px;
            background: var(--bg-color);
            text-align: left;
        }

        .slider-container { margin-top: 20px; font-size: 13px; }
        input[type="range"] { width: 100%; cursor: pointer; }

        .label { font-weight: bold; color: var(--accent-color); font-size: 14px; }
    </style>
</head>
<body>

<div id="main-container">
    <div class="controls">
        <button id="dark-mode-btn" onclick="toggleDarkMode()">Dark Mode</button>
        <div>
            <button id="start-btn" onclick="startProcess()">Start</button>
            <button id="stop-btn" onclick="stopProcess()">Stop</button>
        </div>
    </div>

    <div class="label">Input (Hindi):</div>
    <div id="input-text" class="display-area">Aapki awaaz yahan dikhegi...</div>

    <div class="label" style="margin-top:15px;">Output (English):</div>
    <div id="output-text" class="display-area">Translation yahan dikhega...</div>

    <div class="slider-container">
        <label>Stealth Mode (Opacity):</label>
        <input type="range" min="0.05" max="1" step="0.05" value="1" oninput="adjustOpacity(this.value)">
    </div>
</div>

<script>
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'hi-IN';
        recognition.continuous = true;
        recognition.interimResults = false;
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const btn = document.getElementById('dark-mode-btn');
        btn.innerText = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
    }

    function adjustOpacity(val) {
        document.getElementById('main-container').style.opacity = val;
    }

    function startProcess() {
        recognition.start();
        document.getElementById('input-text').innerText = "Suna ja raha hai...";
    }

    function stopProcess() {
        recognition.stop();
    }

    recognition.onresult = async (event) => {
        let hindiText = event.results[event.results.length - 1][0].transcript;
        document.getElementById('input-text').innerText = hindiText;

        // Translation API Call
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${hindiText}&langpair=hi|en`);
        const data = await res.json();
        let englishText = data.responseData.translatedText;
        
        document.getElementById('output-text').innerText = englishText;

        // Voice Output
        let speech = new SpeechSynthesisUtterance(englishText);
        speech.lang = 'en-US';
        window.speechSynthesis.speak(speech);
    };

    recognition.onerror = (err) => console.error("Error:", err);
</script>

</body>
</html>
